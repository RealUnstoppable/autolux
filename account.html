<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Portal | Unstoppable Detailing</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0A0A0A;
            --bg-card: #141414;
            --text-main: #F5F5F7;
            --text-muted: #A3A3A3;
            --accent: #2563EB;
            --border: rgba(255, 255, 255, 0.1);
        }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-main); }

        nav {
            padding: 20px 50px; background: rgba(10, 10, 10, 0.95);
            border-bottom: 1px solid var(--border); display: flex;
            justify-content: space-between; align-items: center;
        }
        .logo { font-weight: 800; font-size: 1.5rem; color: var(--text-main); text-decoration: none; }
        .nav-links a { color: var(--text-main); text-decoration: none; margin-left: 20px; font-weight: 500; }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        h1 { margin-top: 0; margin-bottom: 30px; font-size: 2rem; border-bottom: 2px solid var(--accent); display: inline-block; padding-bottom: 10px;}
        h2 { font-size: 1.5rem; margin-top: 0; margin-bottom: 20px;}

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }

        .card { background: var(--bg-card); padding: 25px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 30px;}

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: var(--text-muted); font-size: 0.9rem;}
        .form-group input { width: 100%; padding: 10px; background: var(--bg-dark); border: 1px solid var(--border); color: white; border-radius: 6px; box-sizing: border-box; }

        .btn { padding: 10px 20px; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-danger { background: rgba(220, 38, 38, 0.2); color: #ef4444; }

        .appointment-item, .vehicle-item { padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;}
        .appointment-item:last-child, .vehicle-item:last-child { border-bottom: none; }
        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; background-color: rgba(37, 99, 235, 0.2); color: var(--accent); }
        .status-badge.cancelled { background-color: rgba(220, 38, 38, 0.2); color: #ef4444; }

        /* Loading Overlay */
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); display: flex; align-items: center;
            justify-content: center; z-index: 9999; flex-direction: column;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px;}
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p>Loading Profile...</p>
    </div>

    <nav>
        <a href="index.html" class="logo">UNSTOPPABLE</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="booking.html">Book Service</a>
            <a href="#" id="sign-out-btn" style="color: #ef4444;">Sign Out</a>
        </div>
    </nav>

    <div class="container" style="display: none;" id="main-content">
        <h1>Client Portal</h1>

        <div class="grid">
            <div>
                <div class="card">
                    <h2>Profile Information</h2>
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="profile-name" placeholder="Loading...">
                    </div>
                    <div class="form-group">
                        <label>Email (Read Only)</label>
                        <input type="email" id="profile-email" disabled>
                    </div>
                    <p id="profile-msg" style="color: #16A34A; font-size: 0.85rem; display: none;">Saved</p>
                </div>

                <div class="card">
                    <h2>Saved Vehicles</h2>
                    <div id="vehicles-list">
                        <!-- Vehicles injected here -->
                    </div>
                    <div style="margin-top: 15px; display: flex; gap: 10px;">
                        <input type="text" id="new-vehicle" placeholder="e.g. 2021 Porsche 911" style="flex-grow: 1; padding: 10px; background: var(--bg-dark); border: 1px solid var(--border); color: white; border-radius: 6px;">
                        <button class="btn" id="add-vehicle-btn">Add</button>
                    </div>
                </div>
            </div>

            <div>
                <div class="card">
                    <h2>Your Appointments</h2>
                    <div id="appointments-list">
                        <!-- Appointments injected here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db, waitForAuthState, getUserRedirectPath } from '/js/auth.js';
        import { signOut } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-auth.js";
        import { doc, getDoc, updateDoc, collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";

        let currentUser = null;
        let debounceTimer;

        // Debounce utility for writes
        function debounceUpdate(func, delay = 1000) {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(func, delay);
        }

        async function initPortal() {
            try {
                // Wait firmly for auth state
                currentUser = await waitForAuthState();

                if (!currentUser) {
                    window.location.replace('sign in beta.html');
                    return;
                }

                // Concurrent Data Fetching
                const userDocPromise = getDoc(doc(db, "users", currentUser.uid));
                const appointmentsPromise = getDocs(query(collection(db, "bookings"), where("userId", "==", currentUser.uid)));

                const [userDoc, appointmentsSnap] = await Promise.all([userDocPromise, appointmentsPromise]);

                if (!userDoc.exists()) {
                    console.error("User profile document missing. Fallback failed.");
                    // In a robust system, we might trigger a recreation here.
                } else {
                    const userData = userDoc.data();

                    // Admin redirect safety
                    if (userData.isAdmin) {
                         const path = await getUserRedirectPath(currentUser);
                         if(!window.location.pathname.includes(path)) window.location.replace(path);
                    }

                    document.getElementById('profile-email').value = currentUser.email;
                    document.getElementById('profile-name').value = userData.name || '';

                    renderVehicles(userData.vehicles || []);
                }

                // Process Appointments
                const appointments = appointmentsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
                appointments.sort((a,b) => new Date(b.appointmentDate) - new Date(a.appointmentDate));
                renderAppointments(appointments);

                // Reveal UI
                document.getElementById('loading-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';

                setupEventListeners();

            } catch (error) {
                console.error("Error loading portal:", error);
                document.getElementById('loading-overlay').innerHTML = `<p style="color:var(--error);">Error loading data. Please refresh.</p>`;
            }
        }

        function renderVehicles(vehicles) {
            const list = document.getElementById('vehicles-list');
            list.innerHTML = '';
            if (vehicles.length === 0) {
                list.innerHTML = '<p style="color: var(--text-muted); font-size: 0.9rem;">No vehicles saved.</p>';
                return;
            }

            vehicles.forEach((v, index) => {
                const el = document.createElement('div');
                el.className = 'vehicle-item';

                function escapeHTML(str) {
                    if (str == null) return '';
                    return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
                }

                el.innerHTML = `
                    <span>${escapeHTML(v)}</span>
                    <button class="btn btn-danger btn-sm remove-vehicle-btn" style="padding: 5px 10px;" data-index="${index}">Remove</button>
                `;
                list.appendChild(el);
            });
        }

        function renderAppointments(appointments) {
            const list = document.getElementById('appointments-list');
            list.innerHTML = '';
            if (appointments.length === 0) {
                list.innerHTML = '<p style="color: var(--text-muted); font-size: 0.9rem;">No appointments found.</p>';
                return;
            }

            appointments.forEach(a => {
                const el = document.createElement('div');
                el.className = 'appointment-item';
                const date = new Date(a.appointmentDate).toLocaleString([], {weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit'});
                let badgeClass = 'status-badge';
                if(a.status === 'cancelled') badgeClass += ' cancelled';

                function escapeHTML(str) {
                    if (str == null) return '';
                    return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
                }

                el.innerHTML = `
                    <div>
                        <div style="font-weight: 600; margin-bottom: 5px;">${escapeHTML(a.package)}</div>
                        <div style="color: var(--text-muted); font-size: 0.85rem;">${date} • ${escapeHTML(a.vehicle)}</div>
                    </div>
                    <div class="${badgeClass}">${escapeHTML(a.status).replace('_', ' ')}</div>
                `;
                list.appendChild(el);
            });
        }

        function setupEventListeners() {
            // Debounced Name Update
            document.getElementById('profile-name').addEventListener('input', (e) => {
                const newName = e.target.value.trim();
                const msg = document.getElementById('profile-msg');
                msg.style.display = 'none';

                debounceUpdate(async () => {
                    try {
                        await updateDoc(doc(db, "users", currentUser.uid), { name: newName });
                        msg.style.display = 'block';
                        setTimeout(() => msg.style.display = 'none', 2000);
                    } catch (err) {
                        console.error("Error updating name:", err);
                    }
                });
            });

            // Add Vehicle
            document.getElementById('add-vehicle-btn').addEventListener('click', async () => {
                const input = document.getElementById('new-vehicle');
                const val = input.value.trim();
                if (!val) return;

                try {
                    const userRef = doc(db, "users", currentUser.uid);
                    const userSnap = await getDoc(userRef);
                    const vehicles = userSnap.data().vehicles || [];
                    vehicles.push(val);

                    await updateDoc(userRef, { vehicles: vehicles });
                    renderVehicles(vehicles);
                    input.value = '';
                } catch (err) {
                    console.error("Error adding vehicle:", err);
                }
            });

            // Remove Vehicle
            document.getElementById('vehicles-list').addEventListener('click', async (e) => {
                if (e.target.classList.contains('remove-vehicle-btn')) {
                    const index = parseInt(e.target.dataset.index, 10);
                    try {
                        const userRef = doc(db, "users", currentUser.uid);
                        const userSnap = await getDoc(userRef);
                        let vehicles = userSnap.data().vehicles || [];
                        vehicles.splice(index, 1);

                        await updateDoc(userRef, { vehicles: vehicles });
                        renderVehicles(vehicles);
                    } catch (err) {
                        console.error("Error removing vehicle:", err);
                    }
                }
            });

            document.getElementById('sign-out-btn').addEventListener('click', (e) => {
                e.preventDefault();
                signOut(auth).then(() => {
                    window.location.replace('sign in beta.html');
                });
            });
        }

        initPortal();
    </script>
</body>
</html>
