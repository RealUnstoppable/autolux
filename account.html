<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Account | Unstoppable Detailing</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0A0A0A;
            --bg-card: #141414;
            --text-main: #F5F5F7;
            --text-muted: #A3A3A3;
            --accent: #2563EB;
            --accent-red: #ef4444;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-dark);
            color: var(--text-main); padding: 20px;
        }

        /* Loading Overlay */
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); display: flex; align-items: center; justify-content: center;
            z-index: 9999; flex-direction: column;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1); border-left-color: var(--accent);
            border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Layout */
        .container {
            max-width: 1000px; margin: 60px auto; display: none; /* Hidden until auth resolves */
        }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        h1 { margin: 0; font-size: 2rem; }

        .btn-logout { background: transparent; color: var(--accent-red); border: 1px solid var(--accent-red); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .btn-logout:hover { background: rgba(239, 68, 68, 0.1); }
        .btn-primary { background: var(--accent); color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; text-decoration: none; display: inline-block;}

        .grid { display: grid; grid-template-columns: 1fr; gap: 30px; }
        @media (min-width: 768px) { .grid { grid-template-columns: 1fr 2fr; } }

        .card { background: var(--bg-card); padding: 25px; border-radius: 8px; border: 1px solid var(--border); }
        .card h2 { font-size: 1.2rem; margin-top: 0; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }

        /* Form elements */
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: var(--text-muted); }
        .form-group input {
            width: 100%; padding: 10px; background: var(--bg-dark); border: 1px solid var(--border);
            color: white; border-radius: 4px; box-sizing: border-box;
        }

        /* Lists */
        .list-item { background: var(--bg-dark); padding: 15px; border-radius: 6px; border: 1px solid var(--border); margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;}
        .list-item p { margin: 0 0 5px 0; }
        .list-item small { color: var(--text-muted); }
        .status-badge { font-size: 0.8rem; padding: 4px 8px; border-radius: 12px; background: rgba(255,255,255,0.1); }
        .status-badge.pending { color: #FBBF24; background: rgba(251, 191, 36, 0.2); }
        .status-badge.completed { color: #16A34A; background: rgba(22, 163, 74, 0.2); }

        .nav-link { position: absolute; top: 20px; left: 20px; color: var(--text-muted); text-decoration: none; font-size: 0.9rem; }
        .nav-link:hover { color: white; }
    </style>
</head>
<body>

    <a href="index.html" class="nav-link">← Back to Home</a>

    <!-- Blocking Loading State -->
    <div id="loading-overlay">
        <div class="spinner"></div>
        <p style="margin-top: 15px; color: var(--text-muted);">Authenticating...</p>
    </div>

    <div class="container" id="main-content">
        <header>
            <div>
                <h1 id="welcome-msg">Welcome</h1>
                <p style="color: var(--text-muted); margin: 5px 0 0 0;" id="user-email"></p>
            </div>
            <div>
                 <a href="booking.html" class="btn-primary" style="margin-right: 10px;">Book New Detail</a>
                 <button class="btn-logout" id="logout-btn">Sign Out</button>
            </div>
        </header>

        <div class="grid">
            <!-- Sidebar: Profile & Vehicles -->
            <div>
                <div class="card" style="margin-bottom: 30px;">
                    <h2>Profile Information</h2>
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" id="profile-name" placeholder="Loading...">
                    </div>
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="tel" id="profile-phone" placeholder="Add phone number">
                    </div>
                    <p id="profile-msg" style="font-size: 0.85rem; color: #16A34A; display: none;">Saved</p>
                </div>

                <div class="card">
                    <h2>My Vehicles</h2>
                    <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 15px;">Primary vehicle for detailing:</p>
                    <div class="form-group">
                        <label>Make & Model</label>
                        <input type="text" id="vehicle-make-model" placeholder="e.g. 2022 Porsche 911">
                    </div>
                    <p id="vehicle-msg" style="font-size: 0.85rem; color: #16A34A; display: none;">Saved</p>
                </div>
            </div>

            <!-- Main Area: Appointments -->
            <div class="card">
                <h2>My Appointments</h2>
                <div id="appointments-container">
                    <p style="color: var(--text-muted); text-align: center; padding: 20px;">Loading appointments...</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db, getAuthStatePromise, ensureUserDocument, getUserRedirectPath, safeRedirect } from '/js/auth.js';
        import { signOut } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-auth.js";
        import { doc, updateDoc, collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";

        const loadingOverlay = document.getElementById('loading-overlay');
        const mainContent = document.getElementById('main-content');
        let currentUser = null;

        // Initialize page by resolving auth state definitively
        async function initPage() {
            try {
                const user = await getAuthStatePromise();

                if (!user) {
                    safeRedirect('sign in beta.html');
                    return;
                }

                currentUser = user;

                // Fetch independent data streams concurrently (Fixes N+1 issue)
                const [userData, appointments] = await Promise.all([
                    ensureUserDocument(user),
                    fetchAppointments(user.uid)
                ]);

                // Verify routing rules
                const redirectPath = getUserRedirectPath(user, userData, window.location.pathname);
                if (redirectPath) {
                    safeRedirect(redirectPath);
                    return;
                }

                // Render UI
                renderProfile(userData);
                renderAppointments(appointments);

                // Reveal content
                loadingOverlay.style.display = 'none';
                mainContent.style.display = 'block';

            } catch (error) {
                console.error("Initialization error:", error);
                loadingOverlay.innerHTML = `<p style="color: #ef4444;">Error loading profile. Please refresh.</p>`;
            }
        }

        async function fetchAppointments(uid) {
            try {
                const q = query(
                    collection(db, "bookings"),
                    where("userId", "==", uid)
                );
                const snapshot = await getDocs(q);
                const docs = snapshot.docs.map(doc => ({id: doc.id, ...doc.data()}));
                // Sort client-side if no index exists
                docs.sort((a,b) => new Date(b.appointmentDate) - new Date(a.appointmentDate));
                return docs;
            } catch (e) {
                console.error("Error fetching appointments:", e);
                return [];
            }
        }

        function escapeHTML(str) {
            if (str == null) return '';
            return String(str)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function renderProfile(userData) {
            document.getElementById('welcome-msg').textContent = `Welcome, ${escapeHTML(userData.name || 'User')}`;
            document.getElementById('user-email').textContent = escapeHTML(userData.email);

            document.getElementById('profile-name').value = userData.name || '';
            document.getElementById('profile-phone').value = userData.contactInfo?.phone || '';

            // Assume first vehicle is primary for this simple UI
            if (userData.vehicles && userData.vehicles.length > 0) {
                document.getElementById('vehicle-make-model').value = userData.vehicles[0];
            }
        }

        function renderAppointments(appointments) {
            const container = document.getElementById('appointments-container');
            container.innerHTML = '';

            if (appointments.length === 0) {
                container.innerHTML = `<p style="color: var(--text-muted); text-align: center; padding: 20px;">You have no upcoming appointments.<br><br><a href="booking.html" class="btn-primary" style="display:inline-block; margin-top:10px;">Book Now</a></p>`;
                return;
            }

            appointments.forEach(appt => {
                const dateObj = new Date(appt.appointmentDate);
                const dateStr = isNaN(dateObj) ? 'Date Pending' : dateObj.toLocaleString([], {weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit'});
                const status = appt.status || 'pending';

                const el = document.createElement('div');
                el.className = 'list-item';
                el.innerHTML = `
                    <div>
                        <p><strong>${escapeHTML(appt.package || 'Detailing Service')}</strong></p>
                        <small>${dateStr} • ${escapeHTML(appt.vehicle || 'Vehicle not specified')}</small>
                    </div>
                    <span class="status-badge ${status}">${escapeHTML(status)}</span>
                `;
                container.appendChild(el);
            });
        }

        // --- DEBOUNCED AUTO-SAVE LOGIC ---
        let profileDebounceTimer;
        let vehicleDebounceTimer;

        function debounceProfileSave(fn, delay = 1000) {
            clearTimeout(profileDebounceTimer);
            profileDebounceTimer = setTimeout(fn, delay);
        }

        function debounceVehicleSave(fn, delay = 1000) {
            clearTimeout(vehicleDebounceTimer);
            vehicleDebounceTimer = setTimeout(fn, delay);
        }

        async function saveProfileData() {
            if (!currentUser) return;
            const name = document.getElementById('profile-name').value.trim();
            const phone = document.getElementById('profile-phone').value.trim();
            const msgEl = document.getElementById('profile-msg');

            try {
                const userRef = doc(db, "users", currentUser.uid);
                await updateDoc(userRef, {
                    name: name,
                    "contactInfo.phone": phone
                });
                msgEl.style.display = 'block';
                setTimeout(() => msgEl.style.display = 'none', 2000);
            } catch (e) {
                console.error("Failed to save profile:", e);
            }
        }

        async function saveVehicleData() {
             if (!currentUser) return;
             const vehicle = document.getElementById('vehicle-make-model').value.trim();
             const msgEl = document.getElementById('vehicle-msg');

             try {
                const userRef = doc(db, "users", currentUser.uid);
                // Simple implementation: overwrite the vehicles array with the primary vehicle
                const vehicles = vehicle ? [vehicle] : [];
                await updateDoc(userRef, { vehicles: vehicles });
                msgEl.style.display = 'block';
                setTimeout(() => msgEl.style.display = 'none', 2000);
             } catch (e) {
                 console.error("Failed to save vehicle:", e);
             }
        }

        document.getElementById('profile-name').addEventListener('input', () => debounceProfileSave(saveProfileData));
        document.getElementById('profile-phone').addEventListener('input', () => debounceProfileSave(saveProfileData));
        document.getElementById('vehicle-make-model').addEventListener('input', () => debounceVehicleSave(saveVehicleData));

        // Logout
        document.getElementById('logout-btn').addEventListener('click', async () => {
            await signOut(auth);
            safeRedirect('index.html');
        });

        // Start
        initPage();

    </script>
</body>
</html>
