<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Client Portal | Unstoppable Detailing</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0A0A0A;
            --bg-card: #141414;
            --text-main: #F5F5F7;
            --text-muted: #A3A3A3;
            --accent: #2563EB;
            --gold: #D4AF37;
            --border: rgba(255, 255, 255, 0.1);
            --accent-red: #ef4444;
        }

        body {
            margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-dark);
            color: var(--text-main);
        }

        /* Nav Header */
        header {
            padding: 20px; border-bottom: 1px solid var(--border); background: var(--bg-card);
            display: flex; justify-content: space-between; align-items: center;
        }

        nav {
            padding: 20px 50px; background: rgba(10, 10, 10, 0.95);
            border-bottom: 1px solid var(--border); display: flex;
            justify-content: space-between; align-items: center;
        }

        .logo { font-weight: 800; font-size: 1.5rem; color: var(--text-main); text-decoration: none; }
        .nav-links a { color: var(--text-main); text-decoration: none; margin-left: 20px; font-weight: 500; cursor: pointer; }

        .container {
            max-width: 1000px; margin: 40px auto; padding: 0 20px;
        }

        .grid-layout {
            display: grid; grid-template-columns: 1fr 2fr; gap: 30px;
        }

        @media (max-width: 768px) {
            .grid-layout { grid-template-columns: 1fr; }
        }

        .card {
            background: var(--bg-card); padding: 25px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px;
        }

        .card h2 { margin-top: 0; font-size: 1.2rem; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 20px; }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-muted); }
        .form-group input {
            width: 100%; padding: 12px; border-radius: 6px; border: 1px solid var(--border);
            background: var(--bg-dark); color: var(--text-main); box-sizing: border-box; font-family: inherit;
        }
        .form-group input:disabled { opacity: 0.6; cursor: not-allowed; }

        .btn { padding: 10px 20px; background: var(--accent); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn:hover { opacity: 0.9; }

        .vehicle-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; background: var(--bg-dark); border: 1px solid var(--border);
            border-radius: 6px; margin-bottom: 10px;
        }

        .appointment-card {
            padding: 20px; background: var(--bg-dark); border: 1px solid var(--border);
            border-left: 4px solid var(--accent); border-radius: 6px; margin-bottom: 15px;
        }
        .appointment-card.pending { border-left-color: var(--gold); }
        .appointment-card h3 { margin: 0 0 10px 0; font-size: 1.1rem; }
        .appointment-card p { margin: 5px 0; color: var(--text-muted); font-size: 0.9rem; }

        .badge {
            display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; text-transform: uppercase;
        }
        .badge.pending { background: rgba(212, 175, 55, 0.2); color: var(--gold); }
        .badge.confirmed { background: rgba(22, 163, 74, 0.2); color: #16A34A; }

        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 10, 0.9); display: flex; align-items: center; justify-content: center; z-index: 9999; flex-direction: column;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid var(--border); border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>
    <div id="loading-overlay">
        <div class="spinner"></div>
        <p>Loading Profile...</p>
    </div>

    <nav>
        <a href="index.html" class="logo">UNSTOPPABLE</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="booking.html" style="color: var(--accent);">Book Service</a>
            <a id="logout-btn">Sign Out</a>
        </div>
    </nav>

    <div class="container" style="display: none;" id="main-content">
        <h1>Client Portal</h1>

        <div class="grid-layout">
            <div>
                <div class="card">
                    <h2>Profile Information</h2>
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="profile-name" placeholder="Loading...">
                    </div>
                    <div class="form-group">
                        <label>Email (Read Only)</label>
                        <input type="email" id="profile-email" disabled>
                    </div>
                    <p id="profile-msg" style="color: #16A34A; font-size: 0.85rem; display: none;">Saved</p>
                </div>

                <div class="card">
                    <h2>Saved Vehicles</h2>
                    <div id="vehicles-list">
                        <!-- Vehicles injected here -->
                    </div>
                    <div style="margin-top: 15px; display: flex; gap: 10px;">
                        <input type="text" id="new-vehicle" placeholder="e.g. 2021 Porsche 911" style="flex-grow: 1; padding: 10px; background: var(--bg-dark); border: 1px solid var(--border); color: white; border-radius: 6px;">
                        <button class="btn" id="add-vehicle-btn">Add</button>
                    </div>
                </div>
            </div>

            <div>
                <div class="card">
                    <h2>Your Appointments</h2>
                    <div id="appointments-list">
                        <!-- Appointments injected here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db, waitForAuthState, getUserRedirectPath } from '/js/auth.js';
        import { signOut } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-auth.js";
        import { doc, getDoc, updateDoc, collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";
        import { escapeHTML } from '/js/utils.js';

        let currentUser = null;
        let userData = null;
        let debounceTimer;

        // Debounce utility for writes
        function debounceUpdate(func, delay = 1000) {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(func, delay);
        }

        async function initPortal() {
            try {
                // Wait firmly for auth state
                currentUser = await waitForAuthState();

                if (!currentUser) {
                    sessionStorage.setItem('redirectAfterLogin', window.location.pathname);
                    window.location.replace('sign in beta.html');
                    return;
                }

                // Check Admin Redirect securely
                const userRef = doc(db, "users", currentUser.uid);

                // Fetch Profile and Appointments concurrently
                const appointmentsQuery = query(collection(db, "bookings"), where("userId", "==", currentUser.uid));

                const [userSnap, appointmentsSnap] = await Promise.all([
                    getDoc(userRef),
                    getDocs(appointmentsQuery)
                ]);

                if (userSnap.exists()) {
                    userData = userSnap.data();
                    if (userData.isAdmin) {
                        window.location.replace('admin.html');
                        return;
                    }
                    renderProfile(userData);
                    renderVehicles(userData.vehicles || []);
                }

                renderAppointments(appointmentsSnap);

                document.getElementById('loading-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';

            } catch (error) {
                console.error("Portal Init Error:", error);
                document.getElementById('loading-overlay').innerHTML = `<p style="color:var(--accent-red);">Error loading profile. Refresh page.</p>`;
            }
        }

        function renderProfile(data) {
            document.getElementById('profile-name').value = data.name || currentUser.displayName || '';
            document.getElementById('profile-email').value = currentUser.email || '';
        }

        function renderVehicles(vehicles) {
            const vList = document.getElementById('vehicles-list');
            vList.innerHTML = '';

            if (vehicles.length === 0) {
                vList.innerHTML = '<p style="color:var(--text-muted); font-size: 0.9rem;">No vehicles saved.</p>';
                return;
            }

            vehicles.forEach((v, index) => {
                const safeV = escapeHTML(v);
                const el = document.createElement('div');
                el.className = 'vehicle-item';
                el.innerHTML = `
                    <span>${safeV}</span>
                    <button class="btn" style="background:var(--accent-red); padding: 5px 10px; font-size: 0.8rem;" onclick="removeVehicle(${index})">Remove</button>
                `;
                vList.appendChild(el);
            });
        }

        function renderAppointments(snapshot) {
            const aList = document.getElementById('appointments-list');
            aList.innerHTML = '';

            if (snapshot.empty) {
                aList.innerHTML = '<p style="color:var(--text-muted); font-size: 0.9rem;">No upcoming appointments.</p>';
                return;
            }

            const appointments = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

            // Sort by date local
            appointments.sort((a,b) => new Date(a.appointmentDate) - new Date(b.appointmentDate));

            appointments.forEach(app => {
                const el = document.createElement('div');
                el.className = `appointment-card ${app.status === 'pending' ? 'pending' : ''}`;

                const dateObj = new Date(app.appointmentDate);
                const dateStr = !isNaN(dateObj) ? dateObj.toLocaleString() : escapeHTML(app.appointmentDate);
                const safePackage = escapeHTML(app.package || 'Detailing Service');
                const safeVehicle = escapeHTML(app.vehicle || 'Not specified');

                el.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                        <div>
                            <h3>${safePackage}</h3>
                            <p><strong>Vehicle:</strong> ${safeVehicle}</p>
                            <p><strong>Date:</strong> ${dateStr}</p>
                        </div>
                        <span class="badge ${app.status === 'pending' ? 'pending' : 'confirmed'}">${escapeHTML(app.status)}</span>
                    </div>
                `;
                aList.appendChild(el);
            });
        }

        // Live Profile Updates (Debounced)
        document.getElementById('profile-name').addEventListener('input', () => {
            debounceUpdate(async () => {
                const name = document.getElementById('profile-name').value.trim();
                const msg = document.getElementById('profile-msg');
                try {
                    await updateDoc(doc(db, "users", currentUser.uid), { name: name });
                    msg.style.display = 'block';
                    setTimeout(() => msg.style.display = 'none', 2000);
                } catch(e) {
                     console.error("Profile save error", e);
                }
            }, 800);
        });

        // Add Vehicle
        document.getElementById('add-vehicle-btn').addEventListener('click', async () => {
            const input = document.getElementById('new-vehicle');
            const val = input.value.trim();
            if(!val) return;

            const btn = document.getElementById('add-vehicle-btn');
            btn.disabled = true;

            try {
                const newVehicles = [...(userData.vehicles || []), val];
                await updateDoc(doc(db, "users", currentUser.uid), { vehicles: newVehicles });
                userData.vehicles = newVehicles; // update local state
                input.value = '';
                renderVehicles(newVehicles);
            } catch(e) {
                console.error("Add vehicle error", e);
            } finally {
                btn.disabled = false;
            }
        });

        // Remove vehicle (exposed to window for inline onclick)
        window.removeVehicle = async (index) => {
            if(!confirm('Remove this vehicle?')) return;
            try {
                const newVehicles = [...userData.vehicles];
                newVehicles.splice(index, 1);
                await updateDoc(doc(db, "users", currentUser.uid), { vehicles: newVehicles });
                userData.vehicles = newVehicles;
                renderVehicles(newVehicles);
            } catch(e) {
                console.error("Remove vehicle error", e);
            }
        };

        // Logout
        document.getElementById('logout-btn').addEventListener('click', async () => {
            await signOut(auth);
            window.location.replace('index.html');
        });

        // Start
        initPortal();

    </script>
</body>
</html>
