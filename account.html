<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Client Portal | Unstoppable Detailing</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0A0A0A;
            --bg-card: #141414;
            --text-main: #F5F5F7;
            --text-muted: #A3A3A3;
            --accent: #2563EB;
            --border: rgba(255, 255, 255, 0.1);
        }
        body {
            margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-dark);
            color: var(--text-main); padding: 20px; max-width: 800px; margin: 0 auto;
        }

        /* Navbar */
        nav { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid var(--border); margin-bottom: 30px; }
        .logo { font-weight: 800; font-size: 1.2rem; color: var(--text-main); text-decoration: none; letter-spacing: 1px; }
        .nav-links a { color: var(--text-main); text-decoration: none; margin-left: 15px; font-weight: 500;}
        .nav-links a:hover { color: var(--accent); }

        /* Loading Spinner */
        #loading-spinner { text-align: center; margin-top: 100px; font-size: 1.2rem; color: var(--text-muted); }

        /* Portal Content */
        #portal-content { display: none; }
        .section { background: var(--bg-card); padding: 25px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 20px; }
        .section h2 { margin-top: 0; font-size: 1.5rem; border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 20px;}

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: var(--text-muted); }
        .input-group input { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-dark); color: white; box-sizing: border-box; }

        .list-item { background: var(--bg-dark); padding: 15px; border-radius: 6px; border: 1px solid #222; margin-bottom: 10px; }
        .btn-primary { background: var(--accent); color: white; padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">UNSTOPPABLE</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="#" id="sign-out-btn">Sign Out</a>
        </div>
    </nav>

    <div id="loading-spinner">Loading your profile...</div>

    <div id="portal-content">
        <h1>My Account</h1>

        <div class="section" id="profile-section">
            <h2>Profile</h2>
            <form id="profile-form">
                <div class="input-group">
                    <label>Name</label>
                    <input type="text" id="profile-name">
                </div>
                <div class="input-group">
                    <label>Phone</label>
                    <input type="text" id="profile-phone">
                </div>
                <p id="profile-save-msg" style="color: #16A34A; font-size: 0.85rem; display: none;">Saved</p>
            </form>
        </div>

        <div class="section" id="vehicles-section">
            <h2>Saved Vehicles</h2>
            <div id="vehicles-list"></div>
        </div>

        <div class="section" id="appointments-section">
            <h2>Upcoming Appointments</h2>
            <div id="appointments-list"></div>
        </div>
    </div>

    <script type="module">
        import { auth, db, debounce } from '/js/auth.js';
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-auth.js";
        import { doc, getDoc, updateDoc, collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";

        const spinner = document.getElementById('loading-spinner');
        const portal = document.getElementById('portal-content');
        let currentUser = null;

        // Sign Out Logic
        document.getElementById('sign-out-btn').addEventListener('click', (e) => {
            e.preventDefault();
            signOut(auth);
        });

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                await loadPortalData(user.uid);
            } else {
                if (window.location.pathname !== '/sign in beta.html') {
                    window.location.replace('sign in beta.html');
                }
            }
        });

        async function loadPortalData(uid) {
            try {
                // Fetch data concurrently
                const userRef = doc(db, "users", uid);
                const appointmentsQuery = query(collection(db, "bookings"), where("userId", "==", uid), orderBy("createdAt", "desc"));

                const [userDoc, appointmentsSnapshot] = await Promise.all([
                    getDoc(userRef),
                    getDocs(appointmentsQuery)
                ]);

                // Render Profile & Vehicles
                if (userDoc.exists()) {
                    const data = userDoc.data();
                    document.getElementById('profile-name').value = data.name || '';
                    document.getElementById('profile-phone').value = data.phone || '';

                    // Setup Debounced Auto-Save
                    const saveProfile = debounce(async () => {
                        const msg = document.getElementById('profile-save-msg');
                        msg.style.display = 'none';
                        try {
                            await updateDoc(userRef, {
                                name: document.getElementById('profile-name').value,
                                phone: document.getElementById('profile-phone').value
                            });
                            msg.style.display = 'block';
                            setTimeout(() => msg.style.display = 'none', 2000);
                        } catch (e) {
                            console.error("Error saving profile", e);
                        }
                    }, 1000);

                    document.getElementById('profile-form').addEventListener('input', saveProfile);

                    // Render Vehicles (Assuming stored in user doc as array for this example)
                    // Escape helper to prevent XSS
                    const escapeHTML = (str) => {
                        if (str == null) return '';
                        return String(str)
                            .replace(/&/g, "&amp;")
                            .replace(/</g, "&lt;")
                            .replace(/>/g, "&gt;")
                            .replace(/"/g, "&quot;")
                            .replace(/'/g, "&#039;");
                    };

                    const vList = document.getElementById('vehicles-list');
                    vList.innerHTML = '';
                    if (data.vehicles && data.vehicles.length > 0) {
                        data.vehicles.forEach(v => {
                            const el = document.createElement('div');
                            el.className = 'list-item';
                            el.textContent = `${v.year} ${v.make} ${v.model}`;
                            vList.appendChild(el);
                        });
                    } else {
                        vList.innerHTML = '<p style="color:var(--text-muted); font-size: 0.9rem;">No vehicles saved yet.</p>';
                    }
                }

                // Escape helper scoped to the outer block or redefine if needed
                const escapeHTML = (str) => {
                    if (str == null) return '';
                    return String(str)
                        .replace(/&/g, "&amp;")
                        .replace(/</g, "&lt;")
                        .replace(/>/g, "&gt;")
                        .replace(/"/g, "&quot;")
                        .replace(/'/g, "&#039;");
                };

                // Render Appointments
                const aList = document.getElementById('appointments-list');
                aList.innerHTML = '';
                if (!appointmentsSnapshot.empty) {
                    appointmentsSnapshot.forEach(doc => {
                        const apt = doc.data();
                        const dateStr = escapeHTML(apt.appointmentDate || 'Date Pending');
                        const vehicleStr = escapeHTML(apt.vehicle || 'Unknown Vehicle');
                        const status = escapeHTML(apt.status || 'Pending');

                        const el = document.createElement('div');
                        el.className = 'list-item';
                        el.innerHTML = `<strong>${dateStr}</strong> - ${vehicleStr}<br><span style="font-size: 0.85rem; color: var(--text-muted);">Status: ${status}</span>`;
                        aList.appendChild(el);
                    });
                } else {
                    aList.innerHTML = '<p style="color:var(--text-muted); font-size: 0.9rem;">No upcoming appointments.</p>';
                }

                // Reveal Content
                spinner.style.display = 'none';
                portal.style.display = 'block';

            } catch (error) {
                console.error("Error loading portal data:", error);
                spinner.textContent = "Error loading data. Please try again.";
            }
        }
    </script>
</body>
</html>
