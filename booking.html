<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Book a Detail | Unstoppable Detailing</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0A0A0A;
            --bg-card: #141414;
            --text-main: #F5F5F7;
            --text-muted: #A3A3A3;
            --accent: #2563EB;
            --gold: #D4AF37;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-dark);
            color: var(--text-main); padding: 20px;
        }

        .container {
            max-width: 800px; margin: 40px auto;
        }

        h1 { text-align: center; margin-bottom: 30px; font-size: 2rem; }

        .card { background: var(--bg-card); padding: 30px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 20px;}

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-muted); font-weight: 600;}
        .form-group input, .form-group select {
            width: 100%; padding: 14px; background: var(--bg-dark); border: 1px solid var(--border);
            color: white; border-radius: 6px; box-sizing: border-box; font-size: 1rem;
        }

        .btn-primary {
            display: block; width: 100%; background: var(--accent); color: white;
            padding: 15px; border: none; font-weight: 700; font-size: 1.1rem;
            border-radius: 6px; cursor: pointer; transition: 0.3s; margin-top: 20px;
        }
        .btn-primary:hover { opacity: 0.9; }
        .btn-primary:disabled { background: #444; cursor: not-allowed; }

        /* Loading Overlay */
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10,10,10,0.9); display: flex; align-items: center; justify-content: center;
            z-index: 9999; flex-direction: column; text-align: center; padding: 20px;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1); border-left-color: var(--accent);
            border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .nav-link { position: absolute; top: 20px; left: 20px; color: var(--text-muted); text-decoration: none; font-size: 0.9rem; }
        .nav-link:hover { color: white; }

        #msg-container { margin-top: 20px; text-align: center; font-weight: 600; }
    </style>
</head>
<body>

    <a href="index.html" class="nav-link">← Back to Home</a>

    <!-- Requires Auth to Book -->
    <div id="auth-overlay">
        <div class="spinner"></div>
        <p style="color: var(--text-main); font-size: 1.1rem;" id="overlay-text">Checking authentication...</p>
    </div>

    <div class="container" id="main-content" style="display: none;">
        <h1>Schedule Your Detail</h1>

        <div class="card">
            <form id="booking-form">

                <div class="form-group">
                    <label for="package">Select Service Package</label>
                    <select id="package" required>
                        <option value="" disabled selected>Loading packages...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="vehicle">Vehicle Make & Model</label>
                    <input type="text" id="vehicle" placeholder="e.g. 2023 Tesla Model 3" required>
                </div>

                <div class="form-group">
                    <label for="date">Select Date & Time</label>
                    <input type="datetime-local" id="date" required>
                </div>

                <button type="submit" class="btn-primary" id="submit-btn">Confirm Booking</button>
            </form>
            <div id="msg-container"></div>
        </div>
    </div>

    <script type="module">
        import { auth, db, getAuthStatePromise, ensureUserDocument, getUserRedirectPath, safeRedirect } from '/js/auth.js';
        import { addDoc, collection, serverTimestamp, getDocs } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";

        const overlay = document.getElementById('auth-overlay');
        const overlayText = document.getElementById('overlay-text');
        const mainContent = document.getElementById('main-content');
        const form = document.getElementById('booking-form');
        const submitBtn = document.getElementById('submit-btn');
        const msgContainer = document.getElementById('msg-container');
        const packageSelect = document.getElementById('package');

        let currentUser = null;
        let userData = null;

        async function initBookingPage() {
            try {
                // Wait for definitive auth state
                const user = await getAuthStatePromise();

                if (!user) {
                    overlayText.innerHTML = `You must be signed in to book an appointment.<br><br><a href="sign in beta.html" style="color:var(--accent); text-decoration:none; font-weight:bold;">Click here to Sign In</a>`;
                    document.querySelector('.spinner').style.display = 'none';
                    return;
                }

                currentUser = user;
                userData = await ensureUserDocument(user);

                // Pre-fill vehicle if they have one saved
                if (userData && userData.vehicles && userData.vehicles.length > 0) {
                    document.getElementById('vehicle').value = userData.vehicles[0];
                }

                // Set minimum date to today
                const now = new Date();
                now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
                document.getElementById('date').min = now.toISOString().slice(0,16);

                await loadServiceMenu();

                // Show form
                overlay.style.display = 'none';
                mainContent.style.display = 'block';

            } catch (error) {
                console.error("Error initializing booking:", error);
                overlayText.textContent = "Error loading booking system.";
                document.querySelector('.spinner').style.display = 'none';
            }
        }

        async function loadServiceMenu() {
            // Local Caching (sessionStorage) to reduce Firestore reads for static menus
            const cachedMenu = sessionStorage.getItem('autolux_service_menu');

            if (cachedMenu) {
                populateDropdown(JSON.parse(cachedMenu));
                return;
            }

            try {
                // If not cached, fetch from Firestore
                const snapshot = await getDocs(collection(db, "service_menu"));

                let services = [];
                if (!snapshot.empty) {
                    services = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                } else {
                    // Fallback static data if collection doesn't exist yet
                    services = [
                        { id: 'sedan', name: 'Luxury Sedan - Deep Clean', price: 150 },
                        { id: 'suv', name: 'Luxury SUV - Comprehensive', price: 250 },
                        { id: 'truck', name: 'Premium Truck - Heavy Duty', price: 280 },
                        { id: 'van', name: 'Sprinter Van - Executive', price: 400 },
                        { id: 'club', name: 'The Unstoppable Annual Club', price: 99 }
                    ];
                }

                sessionStorage.setItem('autolux_service_menu', JSON.stringify(services));
                populateDropdown(services);

            } catch (error) {
                console.error("Error loading service menu:", error);
                packageSelect.innerHTML = '<option value="" disabled selected>Error loading packages.</option>';
            }
        }

        function populateDropdown(services) {
            packageSelect.innerHTML = '<option value="" disabled selected>Select a package</option>';
            services.forEach(service => {
                const opt = document.createElement('option');
                opt.value = service.name;
                opt.textContent = `${service.name} (from $${service.price})`;
                packageSelect.appendChild(opt);
            });
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!currentUser) return;

            const selectedPackage = document.getElementById('package').value;
            const vehicle = document.getElementById('vehicle').value.trim();
            const date = document.getElementById('date').value;

            submitBtn.disabled = true;
            submitBtn.textContent = 'Processing...';
            msgContainer.textContent = '';

            try {
                // Write to Firestore securely
                await addDoc(collection(db, "bookings"), {
                    userId: currentUser.uid,
                    customerName: userData?.name || currentUser.displayName || 'Anonymous',
                    customerEmail: currentUser.email,
                    customerPhone: userData?.contactInfo?.phone || '',
                    package: selectedPackage,
                    vehicle: vehicle,
                    appointmentDate: date,
                    status: 'pending',
                    createdAt: serverTimestamp()
                });

                msgContainer.style.color = '#16A34A';
                msgContainer.textContent = 'Booking confirmed! Redirecting to your portal...';

                // Redirect back to portal to view appointment
                setTimeout(() => {
                    safeRedirect('account.html');
                }, 2000);

            } catch (error) {
                console.error("Error saving booking:", error);
                msgContainer.style.color = '#ef4444';
                msgContainer.textContent = 'Error processing booking. Please try again.';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Confirm Booking';
            }
        });

        initBookingPage();

    </script>
</body>
</html>
