<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Book a Detail | Unstoppable Detailing</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0A0A0A;
            --bg-card: #141414;
            --text-main: #F5F5F7;
            --text-muted: #A3A3A3;
            --accent: #2563EB;
            --border: rgba(255, 255, 255, 0.1);
        }
        body {
            margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-dark);
            color: var(--text-main); padding: 20px; max-width: 600px; margin: 0 auto;
        }

        nav { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid var(--border); margin-bottom: 30px; }
        .logo { font-weight: 800; font-size: 1.2rem; color: var(--text-main); text-decoration: none; letter-spacing: 1px; }

        .form-card { background: var(--bg-card); padding: 30px; border-radius: 8px; border: 1px solid var(--border); }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-muted); }
        .input-group input, .input-group select { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-dark); color: white; box-sizing: border-box; font-size: 1rem; }

        .btn-primary { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.3s; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        #loading-overlay { display: none; text-align: center; margin-bottom: 20px; color: var(--accent); font-weight: bold;}
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">UNSTOPPABLE</a>
        <a href="account.html" style="color: var(--text-main); text-decoration: none; font-weight: 500;">My Account</a>
    </nav>

    <div class="form-card">
        <h1 style="margin-top: 0;">Schedule Service</h1>
        <div id="loading-overlay">Verifying session...</div>

        <form id="booking-form">
            <div class="input-group">
                <label for="package">Select Package</label>
                <select id="package" required>
                    <option value="">Loading packages...</option>
                </select>
            </div>
            <div class="input-group">
                <label for="vehicle">Vehicle (Year/Make/Model)</label>
                <input type="text" id="vehicle" placeholder="e.g. 2023 Tesla Model Y" required>
            </div>
            <div class="input-group">
                <label for="date">Preferred Date</label>
                <input type="date" id="date" required>
            </div>
            <button type="submit" class="btn-primary" id="submit-btn" disabled>Book Now</button>
        </form>
        <div id="msg" style="margin-top: 15px; font-size: 0.9rem; text-align: center;"></div>
    </div>

    <script type="module">
        import { auth, db } from '/js/auth.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-auth.js";
        import { collection, addDoc, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";

        let currentUser = null;
        const btn = document.getElementById('submit-btn');
        const overlay = document.getElementById('loading-overlay');

        // Wait for Auth to resolve before allowing submission
        overlay.style.display = 'block';
        onAuthStateChanged(auth, (user) => {
            overlay.style.display = 'none';
            if (user) {
                currentUser = user;
                btn.disabled = false;
            } else {
                if (window.location.pathname !== '/sign in beta.html') {
                    window.location.replace('sign in beta.html');
                }
            }
        });

        // Local sessionStorage Caching for Services
        async function loadServices() {
            const select = document.getElementById('package');
            try {
                const cached = sessionStorage.getItem('servicesCache');
                if (cached) {
                    renderServices(JSON.parse(cached), select);
                } else {
                    // Fallback static packages if DB query fails/doesn't exist
                    const defaultPackages = [
                        { id: 'sedan', name: 'Luxury Sedan - $150' },
                        { id: 'suv', name: 'Luxury SUV - $250' },
                        { id: 'truck', name: 'Premium Truck - $280' },
                        { id: 'van', name: 'Sprinter Van - $400' }
                    ];

                    try {
                        const q = await getDocs(collection(db, "services"));
                        if (!q.empty) {
                            const data = q.docs.map(d => ({ id: d.id, ...d.data() }));
                            sessionStorage.setItem('servicesCache', JSON.stringify(data));
                            renderServices(data, select);
                        } else {
                            sessionStorage.setItem('servicesCache', JSON.stringify(defaultPackages));
                            renderServices(defaultPackages, select);
                        }
                    } catch(e) {
                        console.error("Failed to fetch services from DB, using fallback", e);
                        renderServices(defaultPackages, select);
                    }
                }
            } catch (e) {
                console.error("Error loading services", e);
                select.innerHTML = '<option value="">Error loading packages</option>';
            }
        }

        function renderServices(data, selectEl) {
            selectEl.innerHTML = '<option value="">-- Choose a Package --</option>';
            data.forEach(pkg => {
                selectEl.innerHTML += \`<option value="\${pkg.name}">\${pkg.name}</option>\`;
            });
        }

        loadServices();

        // Submit Booking
        document.getElementById('booking-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentUser) return; // Guard clause

            const msg = document.getElementById('msg');
            btn.disabled = true;
            btn.textContent = 'Submitting...';
            msg.textContent = '';

            const bookingData = {
                userId: currentUser.uid,
                package: document.getElementById('package').value,
                vehicle: document.getElementById('vehicle').value,
                appointmentDate: document.getElementById('date').value,
                status: 'pending',
                createdAt: serverTimestamp()
            };

            try {
                await addDoc(collection(db, "bookings"), bookingData);
                msg.style.color = '#16A34A';
                msg.textContent = 'Booking request submitted successfully! We will contact you soon.';
                document.getElementById('booking-form').reset();
                setTimeout(() => { window.location.href = 'account.html'; }, 2000);
            } catch (error) {
                console.error("Booking Error:", error);
                msg.style.color = '#ef4444';
                msg.textContent = 'Failed to submit booking. Please try again.';
                btn.disabled = false;
                btn.textContent = 'Book Now';
            }
        });
    </script>
</body>
</html>
