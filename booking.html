<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Book Appointment | Unstoppable Detailing</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0A0A0A;
            --bg-card: #141414;
            --text-main: #F5F5F7;
            --text-muted: #A3A3A3;
            --accent: #2563EB;
            --gold: #D4AF37;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-dark);
            color: var(--text-main); padding: 20px;
        }

        .container {
            max-width: 800px; margin: 0 auto; background: var(--bg-card); padding: 40px; border-radius: 12px; border: 1px solid var(--border);
        }

        h1 { margin-top: 0; font-weight: 800; text-align: center; color: var(--gold); }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 0.95rem; }
        .form-group input, .form-group select {
            width: 100%; padding: 12px; border-radius: 6px; border: 1px solid var(--border);
            background: var(--bg-dark); color: var(--text-main); box-sizing: border-box;
        }

        .services-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px;
        }
        .service-card {
            padding: 15px; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; transition: all 0.3s;
            text-align: center;
        }
        .service-card.selected {
            border-color: var(--gold); background: rgba(212, 175, 55, 0.1);
        }
        .service-price { font-weight: 600; color: var(--gold); margin-top: 10px;}

        .btn-primary {
            display: block; width: 100%; padding: 15px; background: var(--accent); color: white; border: none;
            border-radius: 6px; font-weight: 600; font-size: 1.1rem; cursor: pointer; transition: background 0.3s;
        }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-primary:disabled { background: #475569; cursor: not-allowed; }

        .loading-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(10,10,10,0.8);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.1); width: 40px; height: 40px; border-radius: 50%;
            border-left-color: var(--gold); animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #msg { text-align: center; margin-top: 20px; font-weight: 600; }
        .back-nav { margin-bottom: 20px; }
        .back-nav a { color: var(--text-muted); text-decoration: none; }
        .back-nav a:hover { color: var(--text-main); }
    </style>
</head>
<body>

    <div id="auth-loading" class="loading-overlay">
        <div class="spinner"></div>
    </div>

    <div class="container">
        <div class="back-nav"><a href="index.html">← Back to Home</a></div>
        <h1>Schedule Your Detail</h1>
        <p style="text-align: center; color: var(--text-muted); margin-bottom: 40px;">Select a package and choose a date to reserve your spot.</p>

        <div class="form-group">
            <label>Select Service Package</label>
            <div class="services-grid" id="services-container">
                <!-- Populated dynamically, cached in sessionStorage -->
                <div style="text-align:center; grid-column: 1/-1; color: var(--text-muted);">Loading packages...</div>
            </div>
        </div>

        <div class="form-group">
            <label for="appointmentDate">Select Date & Time</label>
            <input type="datetime-local" id="appointmentDate" required>
        </div>

        <div class="form-group">
            <label for="vehicleInfo">Vehicle Make & Model</label>
            <input type="text" id="vehicleInfo" placeholder="e.g., 2023 Tesla Model Y" required>
        </div>

        <button id="book-btn" class="btn-primary" disabled>Complete Booking</button>
        <div id="msg"></div>
    </div>

    <script type="module">
        import { auth, db } from '/js/auth.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-auth.js";
        import { collection, addDoc, getDocs, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";

        let currentUser = null;
        let selectedService = null;
        const bookBtn = document.getElementById('book-btn');
        const servicesContainer = document.getElementById('services-container');

        // Block UI until Auth resolves
        onAuthStateChanged(auth, (user) => {
            const loadingOverlay = document.getElementById('auth-loading');
            if (loadingOverlay) loadingOverlay.style.display = 'none';

            if (!user) {
                // User must be logged in to book
                const currentPath = window.location.pathname;
                sessionStorage.setItem('redirectAfterLogin', currentPath);
                window.location.replace('sign in beta.html');
            } else {
                currentUser = user;
                bookBtn.disabled = false;
            }
        });

        // 1. Optimize Firestore Reads with SessionStorage Caching
        async function loadServices() {
            const cacheKey = 'unstoppable_services_cache';
            const cachedData = sessionStorage.getItem(cacheKey);

            if (cachedData) {
                renderServices(JSON.parse(cachedData));
                return;
            }

            try {
                // Simulated fetch from DB for "services" collection, mapping to local packages
                const packages = [
                    { id: 'pkg1', name: 'Maintenance Wash', price: '$85', desc: 'Exterior wash, wheels cleaned, tire shine, quick interior vacuum.' },
                    { id: 'pkg2', name: 'Premium Detail', price: '$185', desc: 'Deep exterior wash, clay bar, ceramic sealant, full interior deep clean.' },
                    { id: 'pkg3', name: 'Paint Correction', price: '$450', desc: '1-step polish to remove light swirls, topped with premium wax.' }
                ];

                // If we were fetching real docs:
                // const snapshot = await getDocs(collection(db, "services"));
                // const packages = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

                sessionStorage.setItem(cacheKey, JSON.stringify(packages));
                renderServices(packages);
            } catch (error) {
                console.error("Error loading services:", error);
                servicesContainer.innerHTML = '<div style="color:var(--accent-red); grid-column: 1/-1;">Error loading packages. Try again later.</div>';
            }
        }

        function renderServices(packages) {
            servicesContainer.innerHTML = '';
            packages.forEach(pkg => {
                const card = document.createElement('div');
                card.className = 'service-card';
                card.innerHTML = `
                    <div style="font-weight: 600;">${pkg.name}</div>
                    <div style="font-size: 0.85rem; color: var(--text-muted); margin-top: 5px;">${pkg.desc}</div>
                    <div class="service-price">${pkg.price}</div>
                `;
                card.addEventListener('click', () => {
                    document.querySelectorAll('.service-card').forEach(c => c.classList.remove('selected'));
                    card.classList.add('selected');
                    selectedService = pkg;
                });
                servicesContainer.appendChild(card);
            });
        }

        loadServices();

        // 2. Debounce Draft Writes (Prevent Firestore spam)
        let debounceTimer;
        const vehicleInput = document.getElementById('vehicleInfo');

        function saveDraftToLocal() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                const draft = {
                    vehicle: vehicleInput.value,
                    date: document.getElementById('appointmentDate').value,
                    service: selectedService ? selectedService.id : null
                };
                sessionStorage.setItem('booking_draft', JSON.stringify(draft));
                console.log("Draft saved locally");
            }, 800); // 800ms debounce
        }

        vehicleInput.addEventListener('input', saveDraftToLocal);
        document.getElementById('appointmentDate').addEventListener('change', saveDraftToLocal);

        // Restore draft if exists
        window.addEventListener('DOMContentLoaded', () => {
            const draftStr = sessionStorage.getItem('booking_draft');
            if (draftStr) {
                const draft = JSON.parse(draftStr);
                if (draft.vehicle) vehicleInput.value = draft.vehicle;
                if (draft.date) document.getElementById('appointmentDate').value = draft.date;
                // Service selection restoration omitted for brevity, but would map by ID
            }
        });

        // 3. Final Submission
        bookBtn.addEventListener('click', async () => {
            const dateVal = document.getElementById('appointmentDate').value;
            const vehicleVal = vehicleInput.value.trim();
            const msgEl = document.getElementById('msg');

            if (!selectedService) {
                msgEl.style.color = 'var(--accent-red)';
                msgEl.textContent = 'Please select a service package.';
                return;
            }
            if (!dateVal || !vehicleVal) {
                msgEl.style.color = 'var(--accent-red)';
                msgEl.textContent = 'Please fill out all required fields.';
                return;
            }

            bookBtn.disabled = true;
            bookBtn.textContent = 'Processing...';
            msgEl.textContent = '';

            try {
                // Ensure atomic transaction by writing the booking with UID attached
                await addDoc(collection(db, "bookings"), {
                    userId: currentUser.uid,
                    serviceName: selectedService.name,
                    price: selectedService.price,
                    appointmentDate: dateVal,
                    vehicle: vehicleVal,
                    status: 'pending',
                    createdAt: serverTimestamp()
                });

                // Clear draft
                sessionStorage.removeItem('booking_draft');

                msgEl.style.color = '#16A34A';
                msgEl.textContent = 'Booking confirmed! Redirecting to your portal...';

                setTimeout(() => {
                    window.location.replace('account.html');
                }, 2000);

            } catch (error) {
                console.error("Error saving booking:", error);
                msgEl.style.color = 'var(--accent-red)';
                msgEl.textContent = 'Failed to submit booking. Please try again.';
                bookBtn.disabled = false;
                bookBtn.textContent = 'Complete Booking';
            }
        });

    </script>
</body>
</html>
