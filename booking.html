<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Book Appointment | Unstoppable Detailing</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0A0A0A;
            --bg-card: #141414;
            --text-main: #F5F5F7;
            --text-muted: #A3A3A3;
            --accent: #2563EB;
            --gold: #D4AF37;
            --border: rgba(255, 255, 255, 0.1);
        }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-main); }

        nav {
            padding: 20px 50px; background: rgba(10, 10, 10, 0.95);
            border-bottom: 1px solid var(--border); display: flex;
            justify-content: space-between; align-items: center;
        }
        .logo { font-weight: 800; font-size: 1.5rem; color: var(--text-main); text-decoration: none; }
        .nav-links a { color: var(--text-main); text-decoration: none; margin-left: 20px; font-weight: 500; }

        .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
        h1 { margin-top: 0; margin-bottom: 10px; font-size: 2rem; }
        p.subtitle { color: var(--text-muted); margin-bottom: 30px; }

        .card { background: var(--bg-card); padding: 30px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 30px;}

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.95rem;}
        .form-group select, .form-group input { width: 100%; padding: 12px; background: var(--bg-dark); border: 1px solid var(--border); color: white; border-radius: 6px; box-sizing: border-box; font-family: inherit; font-size: 1rem; }

        .btn { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 1.1rem; transition: 0.2s;}
        .btn:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .price-preview { font-size: 1.5rem; font-weight: 800; color: var(--text-main); text-align: right; margin-bottom: 20px; }

        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 10, 0.9); display: flex; align-items: center;
            justify-content: center; z-index: 9999; flex-direction: column;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px;}
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .msg { font-size: 0.9rem; font-weight: 600; margin-top: 15px; text-align: center; }
        .msg.error { color: #ef4444; }
        .msg.success { color: #16A34A; }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div class="spinner"></div>
        <p>Verifying Session...</p>
    </div>

    <nav>
        <a href="index.html" class="logo">UNSTOPPABLE</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="account.html">My Portal</a>
        </div>
    </nav>

    <div class="container" style="display: none;" id="main-content">
        <h1>Schedule Your Detail</h1>
        <p class="subtitle">Select your package and time. We bring the water and power.</p>

        <form class="card" id="booking-form">
            <div class="form-group">
                <label for="vehicle-select">Select Vehicle</label>
                <select id="vehicle-select" required>
                    <option value="" disabled selected>Loading vehicles...</option>
                </select>
                <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 5px;">*If your vehicle isn't listed, please add it in your <a href="account.html" style="color: var(--accent);">Portal</a> first.</p>
            </div>

            <div class="form-group">
                <label for="package-select">Select Package</label>
                <select id="package-select" required>
                    <option value="" disabled selected>Select a service level...</option>
                    <!-- Will be populated via JS/Cache -->
                </select>
            </div>

            <div class="form-group">
                <label for="date-select">Select Date & Time</label>
                <input type="datetime-local" id="date-select" required>
                <p id="date-warning" style="color: var(--accent); font-size: 0.85rem; display: none;">Checking availability...</p>
            </div>

            <div class="price-preview" id="price-preview">Total: $0.00</div>

            <button type="submit" class="btn" id="submit-btn">Confirm Appointment</button>
            <div id="form-msg" class="msg"></div>
        </form>
    </div>

    <script type="module">
        import { auth, db, waitForAuthState } from '/js/auth.js';
        import { doc, getDoc, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";

        let currentUser = null;
        let userData = null;
        let pricingCache = null;

        const packageSelect = document.getElementById('package-select');
        const pricePreview = document.getElementById('price-preview');
        const submitBtn = document.getElementById('submit-btn');
        const dateInput = document.getElementById('date-select');
        const form = document.getElementById('booking-form');
        let dateDebounceTimer;

        async function initBooking() {
            try {
                // Ensure auth is definitive before loading the page or fetching user data
                currentUser = await waitForAuthState();
                if (!currentUser) {
                    sessionStorage.setItem('redirectAfterLogin', window.location.pathname);
                    window.location.replace('sign in beta.html');
                    return;
                }

                // Fetch user data
                const userDoc = await getDoc(doc(db, "users", currentUser.uid));
                if (userDoc.exists()) {
                    userData = userDoc.data();
                    populateVehicles(userData.vehicles || []);
                } else {
                    document.getElementById('form-msg').className = 'msg error';
                    document.getElementById('form-msg').textContent = "Profile error. Please contact support.";
                    submitBtn.disabled = true;
                }

                loadPackages();

                // Set minimum date to today
                const now = new Date();
                now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
                dateInput.min = now.toISOString().slice(0,16);

                // Show UI
                document.getElementById('loading-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';

            } catch (e) {
                console.error("Initialization error:", e);
                document.getElementById('loading-overlay').innerHTML = `<p style="color:#ef4444;">Error loading scheduling system. Please refresh.</p>`;
            }
        }

        function populateVehicles(vehicles) {
            const select = document.getElementById('vehicle-select');
            select.innerHTML = '<option value="" disabled selected>Select a vehicle...</option>';
            if (vehicles.length === 0) {
                const opt = document.createElement('option');
                opt.value = "";
                opt.disabled = true;
                opt.textContent = "No vehicles saved. Go to Portal to add one.";
                select.appendChild(opt);
                submitBtn.disabled = true;
                return;
            }

            vehicles.forEach(v => {
                const opt = document.createElement('option');
                opt.value = v;
                opt.textContent = String(v).replace(/</g, "&lt;").replace(/>/g, "&gt;"); // Simple sanitize
                select.appendChild(opt);
            });
            submitBtn.disabled = false;
        }

        function loadPackages() {
            // Local Session Storage Caching to save reads
            const cached = sessionStorage.getItem('autolux_packages');
            if (cached) {
                pricingCache = JSON.parse(cached);
                renderPackages();
            } else {
                // Simulate fetching from DB if not in cache (hardcoding here to save reads as per instructions)
                pricingCache = [
                    { id: 'sedan_basic', name: 'Luxury Sedan - Basic Wash', price: 150 },
                    { id: 'suv_premium', name: 'Luxury SUV - Deep Clean', price: 250 },
                    { id: 'truck_heavy', name: 'Premium Truck - Heavy Duty', price: 280 },
                    { id: 'van_executive', name: 'Sprinter Van - Executive Detail', price: 400 },
                    { id: 'annual-club', name: 'The Unstoppable Annual Club', price: 99 }
                ];
                sessionStorage.setItem('autolux_packages', JSON.stringify(pricingCache));
                renderPackages();
            }
        }

        function renderPackages() {
            packageSelect.innerHTML = '<option value="" disabled selected>Select a service level...</option>';
            pricingCache.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p.id;
                opt.textContent = `${p.name} ($${p.price})`;
                opt.dataset.price = p.price;
                packageSelect.appendChild(opt);
            });
        }

        // Event Listeners
        packageSelect.addEventListener('change', (e) => {
            const selectedOpt = e.target.options[e.target.selectedIndex];
            const price = parseFloat(selectedOpt.dataset.price || 0);
            pricePreview.textContent = `Total: $${price.toFixed(2)}`;
        });

        // Debounce date selection to simulate checking availability without hammering the DB
        dateInput.addEventListener('change', () => {
            const warnEl = document.getElementById('date-warning');
            warnEl.style.display = 'block';
            warnEl.textContent = 'Checking availability...';
            submitBtn.disabled = true;

            clearTimeout(dateDebounceTimer);
            dateDebounceTimer = setTimeout(() => {
                warnEl.textContent = 'Time slot looks good!';
                warnEl.style.color = '#16A34A';
                submitBtn.disabled = false;
            }, 800);
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const msgEl = document.getElementById('form-msg');
            msgEl.className = 'msg';
            msgEl.textContent = '';

            // Double check auth state right before write
            if (!currentUser) {
                msgEl.className = 'msg error';
                msgEl.textContent = "Session expired. Please sign in again.";
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Processing...';

            const vehicle = document.getElementById('vehicle-select').value;
            const packageId = document.getElementById('package-select').value;
            const dateVal = document.getElementById('date-select').value;

            const selectedOpt = packageSelect.options[packageSelect.selectedIndex];
            const packageName = selectedOpt.textContent.split(' ($')[0];

            try {
                await addDoc(collection(db, "bookings"), {
                    userId: currentUser.uid,
                    customerName: userData.name || currentUser.email,
                    customerEmail: currentUser.email,
                    customerPhone: userData?.contactInfo?.phone || '',
                    vehicle: vehicle,
                    packageId: packageId,
                    package: packageName,
                    appointmentDate: dateVal,
                    status: 'pending',
                    createdAt: serverTimestamp()
                });

                // Clear draft
                sessionStorage.removeItem('booking_draft');

                msgEl.className = 'msg success';
                msgEl.textContent = "Appointment confirmed! Redirecting to portal...";

                setTimeout(() => {
                    window.location.replace('account.html');
                }, 2000);

            } catch (err) {
                console.error("Booking write error:", err);
                msgEl.className = 'msg error';
                msgEl.textContent = "Failed to secure booking. Try again.";
                submitBtn.disabled = false;
                submitBtn.textContent = 'Confirm Appointment';
            }
        });

        initBooking();
    </script>
</body>
</html>
