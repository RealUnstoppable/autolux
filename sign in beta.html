<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sign In | Unstoppable Detailing Services</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0A0A0A;
            --bg-card: #141414;
            --text-main: #F5F5F7;
            --text-muted: #A3A3A3;
            --accent: #2563EB;
            --border: rgba(255, 255, 255, 0.1);
        }
        body {
            margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-dark);
            color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .login-card {
            background: var(--bg-card); padding: 40px; border-radius: 8px; border: 1px solid var(--border); width: 100%; max-width: 400px; box-sizing: border-box; text-align: center;
        }
        .login-card h1 { margin-top: 0; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-muted); }
        .input-group input { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-dark); color: white; box-sizing: border-box; font-size: 1rem; }
        .btn-primary {
            width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.3s;
        }
        .btn-primary:hover { opacity: 0.9; }
        .error-msg { color: #ef4444; font-size: 0.85rem; margin-top: 15px; min-height: 20px; }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>Welcome Back</h1>
        <form id="login-form">
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn-primary" id="login-btn">Sign In</button>
        </form>
        <div id="error-msg" class="error-msg"></div>
    </div>

    <script type="module">
        import { auth, db } from '/js/auth.js';
        import { signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-auth.js";
        import { doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";

        // Check if user is already logged in
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // If they are an admin, redirect to admin.html, else account.html.
                // We'll check the 'isAdmin' flag if possible, but default to account.html
                try {
                     const userDoc = await getDoc(doc(db, "users", user.uid));
                     if (userDoc.exists() && userDoc.data().isAdmin) {
                          if (window.location.pathname !== '/admin.html') {
                              window.location.replace('admin.html');
                          }
                     } else {
                          if (window.location.pathname !== '/account.html') {
                              window.location.replace('account.html');
                          }
                     }
                } catch(e) {
                     console.error("Error fetching user profile", e);
                     if (window.location.pathname !== '/account.html') {
                         window.location.replace('account.html');
                     }
                }
            }
        });

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');
            const errorMsg = document.getElementById('error-msg');

            btn.disabled = true;
            btn.textContent = 'Signing in...';
            errorMsg.textContent = '';

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // Missing Document Fallback
                const userRef = doc(db, "users", user.uid);
                const userDoc = await getDoc(userRef);

                if (!userDoc.exists()) {
                    await setDoc(userRef, {
                        email: user.email,
                        createdAt: new Date(),
                        vehicles: [],
                        appointments: []
                    });
                }

                // onAuthStateChanged will handle the redirect
            } catch (error) {
                console.error("Login Error:", error);
                errorMsg.textContent = 'Invalid email or password.';
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
