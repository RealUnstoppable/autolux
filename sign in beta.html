<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Unstoppable Detailing</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0A0A0A;
            --bg-card: #141414;
            --text-main: #F5F5F7;
            --accent: #2563EB;
            --border: rgba(255, 255, 255, 0.1);
            --error: #ef4444;
        }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-main); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .auth-container { background: var(--bg-card); padding: 40px; border-radius: 8px; border: 1px solid var(--border); width: 100%; max-width: 400px; box-sizing: border-box; text-align: center; }
        .auth-container h1 { margin-top: 0; font-size: 1.8rem; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; }
        .form-group input { width: 100%; padding: 12px; background: var(--bg-dark); border: 1px solid var(--border); color: white; border-radius: 6px; box-sizing: border-box; font-family: inherit; }
        .btn { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: opacity 0.2s; font-family: inherit; font-size: 1rem; }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .toggle-mode { background: none; border: none; color: var(--text-main); text-decoration: underline; cursor: pointer; margin-top: 20px; font-family: inherit; font-size: 0.9rem; }
        .error-msg { color: var(--error); font-size: 0.85rem; margin-top: 10px; display: none; }
        .home-link { display: inline-block; margin-bottom: 20px; color: var(--text-muted); text-decoration: none; font-size: 0.9rem; }
        .home-link:hover { color: var(--text-main); }
    </style>
</head>
<body>

    <div class="auth-container">
        <a href="index.html" class="home-link">← Back to Home</a>
        <h1 id="auth-title">Sign In</h1>

        <form id="auth-form">
            <div class="form-group" id="name-group" style="display: none;">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="John Doe">
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn" id="submit-btn">Sign In</button>
            <div class="error-msg" id="error-msg"></div>
        </form>

        <button class="toggle-mode" id="toggle-mode-btn">Need an account? Sign up</button>
    </div>

    <script type="module">
        import { auth, db, getUserRedirectPath, waitForAuthState } from '/js/auth.js';
        import { signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-auth.js";
        import { doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";

        let isSignUpMode = false;

        const form = document.getElementById('auth-form');
        const title = document.getElementById('auth-title');
        const submitBtn = document.getElementById('submit-btn');
        const toggleModeBtn = document.getElementById('toggle-mode-btn');
        const nameGroup = document.getElementById('name-group');
        const nameInput = document.getElementById('name');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const errorMsg = document.getElementById('error-msg');

        // Check if already logged in securely
        waitForAuthState().then(async (user) => {
            if (user) {
                const redirectPath = await getUserRedirectPath(user);
                // Prevent redirect loop
                if (!window.location.pathname.includes(redirectPath)) {
                    window.location.replace(redirectPath);
                }
            }
        });

        toggleModeBtn.addEventListener('click', () => {
            isSignUpMode = !isSignUpMode;
            title.textContent = isSignUpMode ? 'Create Account' : 'Sign In';
            submitBtn.textContent = isSignUpMode ? 'Sign Up' : 'Sign In';
            toggleModeBtn.textContent = isSignUpMode ? 'Already have an account? Sign in' : 'Need an account? Sign up';
            nameGroup.style.display = isSignUpMode ? 'block' : 'none';
            nameInput.required = isSignUpMode;
            errorMsg.style.display = 'none';
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.textContent = 'Processing...';

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            try {
                let userCredential;
                if (isSignUpMode) {
                    userCredential = await createUserWithEmailAndPassword(auth, email, password);

                    // Create base user document immediately
                    await setDoc(doc(db, "users", userCredential.user.uid), {
                        name: nameInput.value.trim(),
                        email: email,
                        signupDate: serverTimestamp(),
                        isAdmin: false,
                        vehicles: [],
                        appointments: []
                    });
                } else {
                    userCredential = await signInWithEmailAndPassword(auth, email, password);

                    // Fallback: Check if document exists, if not create empty one to prevent soft-locks
                    const userRef = doc(db, "users", userCredential.user.uid);
                    const userSnap = await getDoc(userRef);
                    if (!userSnap.exists()) {
                        await setDoc(userRef, {
                            email: email,
                            signupDate: serverTimestamp(),
                            isAdmin: false,
                            vehicles: [],
                            appointments: []
                        });
                    }
                }

                // Redirect safely
                const redirectPath = await getUserRedirectPath(userCredential.user);
                window.location.replace(redirectPath);

            } catch (error) {
                console.error("Auth error:", error);
                errorMsg.textContent = error.message;
                errorMsg.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = isSignUpMode ? 'Sign Up' : 'Sign In';
            }
        });
    </script>
</body>
</html>
