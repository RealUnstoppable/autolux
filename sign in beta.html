<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sign In | Unstoppable Detailing</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0A0A0A;
            --bg-card: #141414;
            --text-main: #F5F5F7;
            --text-muted: #A3A3A3;
            --accent: #2563EB;
            --gold: #D4AF37;
            --border: rgba(255, 255, 255, 0.1);
            --accent-red: #ef4444;
        }

        body {
            margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-dark);
            color: var(--text-main); display: flex; align-items: center; justify-content: center; height: 100vh;
        }

        .auth-container {
            background: var(--bg-card); padding: 40px; border-radius: 12px; border: 1px solid var(--border);
            width: 100%; max-width: 400px; text-align: center;
        }

        .auth-container h2 {
            margin-top: 0; margin-bottom: 20px; font-weight: 600;
        }

        .input-group {
            margin-bottom: 15px; text-align: left;
        }

        .input-group label {
            display: block; font-size: 0.9rem; color: var(--text-muted); margin-bottom: 5px;
        }

        .input-group input {
            width: 100%; padding: 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-dark); color: var(--text-main); box-sizing: border-box;
        }

        .btn-primary {
            width: 100%; padding: 12px; border-radius: 6px; background: var(--accent); color: white; border: none; font-weight: 600; cursor: pointer; margin-top: 10px;
        }

        .btn-primary:hover {
            background: #1d4ed8;
        }

        #auth-msg {
            margin-top: 15px; font-size: 0.85rem; color: var(--accent-red); min-height: 20px;
        }

        .back-link {
            display: inline-block; margin-top: 20px; color: var(--text-muted); text-decoration: none; font-size: 0.9rem;
        }
        .back-link:hover { color: var(--text-main); }
    </style>
</head>
<body>

    <div class="auth-container">
        <h2>Sign In to Your Portal</h2>

        <div class="input-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="you@example.com" required>
        </div>

        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <button id="login-btn" class="btn-primary">Sign In</button>

        <div id="auth-msg"></div>

        <a href="index.html" class="back-link">← Return to Home</a>
    </div>

    <script type="module">
        import { auth, db } from '/js/auth.js';
        import { signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-auth.js";

        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('login-btn');
        const msgEl = document.getElementById('auth-msg');

        // Centralized Redirect Logic (Avoid Infinite Loops)
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Check if user was trying to access a specific page before login
                const redirectPath = sessionStorage.getItem('redirectAfterLogin') || 'account.html';
                sessionStorage.removeItem('redirectAfterLogin');

                const currentPath = window.location.pathname;
                if (!currentPath.endsWith(redirectPath)) {
                    window.location.replace(redirectPath);
                }
            }
        });

        loginBtn.addEventListener('click', async () => {
            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
                msgEl.textContent = "Please enter both email and password.";
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = "Signing in...";
            msgEl.textContent = "";

            try {
                await signInWithEmailAndPassword(auth, email, password);
                // onAuthStateChanged will handle the redirect
            } catch (error) {
                console.error("Login failed:", error);
                msgEl.textContent = "Invalid email or password. Please try again.";
                loginBtn.disabled = false;
                loginBtn.textContent = "Sign In";
            }
        });

        // Basic enter key support
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                loginBtn.click();
            }
        });
    </script>
</body>
</html>
