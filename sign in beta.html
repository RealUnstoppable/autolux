    <script type="module">
        import { auth, db, getAuthStatePromise, ensureUserDocument, getUserRedirectPath, safeRedirect } from '/js/auth.js';
        import { signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-auth.js";

                    if (redirectPath) {
                        safeRedirect(redirectPath);
                    }
                }
            } catch (e) {
                 console.error("Initial auth check failed", e);
            }
        }

    <script type="module">
        import { auth, db, getUserRedirectPath, waitForAuthState } from '/js/auth.js';
        import { signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-auth.js";
        import { doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";

        let isSignUpMode = false;

        const form = document.getElementById('auth-form');
        const title = document.getElementById('auth-title');
        const submitBtn = document.getElementById('submit-btn');
        const toggleModeBtn = document.getElementById('toggle-mode-btn');
        const nameGroup = document.getElementById('name-group');
        const nameInput = document.getElementById('name');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const errorMsg = document.getElementById('error-msg');

        // Check if already logged in securely
        waitForAuthState().then(async (user) => {
            if (user) {
                const redirectPath = await getUserRedirectPath(user);
                // Prevent redirect loop
                if (!window.location.pathname.includes(redirectPath)) {
                    window.location.replace(redirectPath);
                }
            }
        });

        loginBtn.addEventListener('click', async () => {
            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
                msgEl.textContent = "Please enter both email and password.";
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = "Signing in...";
            msgEl.textContent = "";

            try {
                await signInWithEmailAndPassword(auth, email, password);
                // onAuthStateChanged will handle the redirect
            } catch (error) {
                console.error("Login failed:", error);
                msgEl.textContent = "Invalid email or password. Please try again.";
                loginBtn.disabled = false;
                loginBtn.textContent = "Sign In";
            }
        });

        // Basic enter key support
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                loginBtn.click();
        toggleModeBtn.addEventListener('click', () => {
            isSignUpMode = !isSignUpMode;
            title.textContent = isSignUpMode ? 'Create Account' : 'Sign In';
            submitBtn.textContent = isSignUpMode ? 'Sign Up' : 'Sign In';
            toggleModeBtn.textContent = isSignUpMode ? 'Already have an account? Sign in' : 'Need an account? Sign up';
            nameGroup.style.display = isSignUpMode ? 'block' : 'none';
            nameInput.required = isSignUpMode;
            errorMsg.style.display = 'none';
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const name = nameInput.value.trim();

            errorMsg.textContent = '';
            submitBtn.disabled = true;
            submitBtn.textContent = 'Processing...';

            try {
                let userCredential;
                if (isSignUp) {
                    userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    // Update display name immediately
                    if (name) {
                        await updateProfile(userCredential.user, { displayName: name });
                    }
                } else {
                    userCredential = await signInWithEmailAndPassword(auth, email, password);
                }

                // Ensure document exists and route them correctly
                const userData = await ensureUserDocument(userCredential.user);
                const redirectPath = getUserRedirectPath(userCredential.user, userData, window.location.pathname);

                if (redirectPath) {
                    safeRedirect(redirectPath);
                } else {
                    // Fallback to home if no specific path
                    safeRedirect('index.html');
                }

            } catch (error) {
                console.error("Auth Error:", error);

                // Friendly error messages
                let msg = "An error occurred. Please try again.";
                if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
                    msg = "Invalid email or password.";
                } else if (error.code === 'auth/email-already-in-use') {
                    msg = "An account with this email already exists.";
                } else if (error.code === 'auth/weak-password') {
                    msg = "Password should be at least 6 characters.";
                } else if (error.code === 'auth/invalid-credential') {
                     msg = "Invalid login credentials.";
                }

                errorMsg.textContent = msg;
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = isSignUp ? 'Sign Up' : 'Sign In';
            errorMsg.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.textContent = 'Processing...';

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            try {
                let userCredential;
                if (isSignUpMode) {
                    userCredential = await createUserWithEmailAndPassword(auth, email, password);

                    // Create base user document immediately
                    await setDoc(doc(db, "users", userCredential.user.uid), {
                        name: nameInput.value.trim(),
                        email: email,
                        signupDate: serverTimestamp(),
                        isAdmin: false,
                        vehicles: [],
                        appointments: []
                    });
                } else {
                    userCredential = await signInWithEmailAndPassword(auth, email, password);

                    // Fallback: Check if document exists, if not create empty one to prevent soft-locks
                    const userRef = doc(db, "users", userCredential.user.uid);
                    const userSnap = await getDoc(userRef);
                    if (!userSnap.exists()) {
                        await setDoc(userRef, {
                            email: email,
                            signupDate: serverTimestamp(),
                            isAdmin: false,
                            vehicles: [],
                            appointments: []
                        });
                    }
                }

                // Redirect safely
                const redirectPath = await getUserRedirectPath(userCredential.user);
                window.location.replace(redirectPath);

            } catch (error) {
                console.error("Auth error:", error);
                errorMsg.textContent = error.message;
                errorMsg.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = isSignUpMode ? 'Sign Up' : 'Sign In';
            }
        });
